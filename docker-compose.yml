version: '3.8'

services:
  app:
    build: .
    container_name: library_backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/smart_library?replicaSet=rs0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_URL=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/usr/src/app/uploads

  mongodb:
    image: mongo:6.0
    container_name: library_mongodb
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: library_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: [ "redis-server", "--protected-mode", "no" ]

volumes:
  mongodata:
  redisdata:
